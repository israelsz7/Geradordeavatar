<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Avatar</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="cabecalho">
        <h1>Gerador de Avatar</h1>
        <p>Clique no botão para gerar um avatar diferente</p>
    </div>

    <div class="card">
        <div class="imagem-avatar">
            <img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Felix&radius=50" alt="Avatar" id="avatarImg">
        </div>
        
        <h2 id="nomeAvatar">Felix</h2>
    </div>

    <div class="botoes">
        <button class="btn" id="btnGerar">Gerar Novo Avatar</button>
    </div>

    <div class="carregando" id="carregando">
        <p>Carregando... ⏳</p>
    </div>

    <div class="erro" id="erro">
        <p>❌ Deu erro! Tenta de novo.</p>
    </div>

    <div class="rodape">
        <p>Usando a API do DiceBear</p>
    </div>

    <script src="codigo.js"></script>
</body>
</html>
