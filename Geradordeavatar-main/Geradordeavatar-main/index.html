<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Avatar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container py-4">

        <div class="cabecalho text-center mb-4">
            <h1>Gerador de Avatar</h1>
            <p class="mb-0">Clique no botão para gerar um avatar diferente</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow text-center p-4 mb-4">
                    <div class="imagem-avatar mx-auto mb-3">
                        <img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Felix&radius=50" alt="Avatar" id="avatarImg" class="img-fluid">
                    </div>
                    <h2 class="card-title" id="nomeAvatar">Felix</h2>
                </div>

                <div class="d-grid mb-3">
                    <button class="btn btn-outline-light btn-lg fw-bold" id="btnGerar">
                        Gerar Novo Avatar
                    </button>
                </div>

                <div class="alert alert-light text-center d-none" id="carregando" role="status">
                    Carregando... ⏳
                </div>

                <div class="alert alert-danger text-center d-none" id="erro" role="alert">
                    ❌ Deu erro! Tenta de novo.
                </div>

            </div>
        </div>

        <footer class="text-center mt-3">
            <small class="text-white opacity-75">Usando a API do DiceBear</small>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="codigo.js"></script>
</body>
</html>
